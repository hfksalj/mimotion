Error: Process completed with exit code 1.这个报错是为啥

这个报错其实不是 Git 出问题，而是你的 workflow 因为“没有可提交的内容”而失败了。
关键在这几行输出：

On branch master
Your branch is up to date with 'origin/master'.

nothing to commit, working tree clean
意思是：
👉 当前目录没有任何文件变化
👉 git add . 之后也没有新内容
👉 所以 git commit 根本不会生成提交
❗为什么会变成 Error（exit code 1）？
在本地你可能不会在意，但在 GitHub Actions 里：
git commit 在 没有变更时会返回 exit code 1
你的 shell 是：
/usr/bin/bash -e
-e 表示：只要有一步返回非 0，就直接让整个 job 失败
所以流程变成：
git commit → 没东西可提交 → exit code 1 → workflow 直接报错 ❌
✅ 解决方法（推荐）
方法 1：允许 commit 失败（最简单）
git commit -m "persist tokens trigger by workflow_dispatch" || echo "no changes to commit"
👉 即使没有提交，也不会让 workflow 失败
方法 2：先判断是否有变更（更优雅）
if [ -n "$(git status --porcelain)" ]; then
  git commit -m "persist tokens trigger by workflow_dispatch"
  git push origin master
else
  echo "No changes to commit"
fi
方法 3：只在有提交时 push
git add .

git diff --cached --quiet || git commit -m "persist tokens trigger by workflow_dispatch"
git push origin master
🧠 总结一句话
👉 报错原因不是失败，而是：
“没有东西可以 commit，但 Actions 把它当错误处理了”
